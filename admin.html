<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="admin.css">

</head>
<body>
    <div id="admin-login" style="display: none;">
    <h2>Admin Ieja</h2>
    <input type="text" id="admin-user" placeholder="Lietotājvārds">
    <input type="password" id="admin-pass" placeholder="Parole">
    <button onclick="loginAdmin()">Ielogoties</button>
</div>

<div id="admin-panel" style="display: none;">
    <div class="container admin-container">
        <h2>Admin Panelis</h2>
        
        <input type="text" id="new-topic" placeholder="Tēmas nosaukums">
        
        <div id="question-creator">
            <input type="text" id="q-text-input" placeholder="Ieraksti jautājumu šeit...">
            
            <div class="answers-grid">
                <input type="text" class="ans-input" placeholder="Pareizā atbilde" style="border-color: #28a745;">
                <input type="text" class="ans-input" placeholder="Nepareizā atbilde 1">
                <input type="text" class="ans-input" placeholder="Nepareizā atbilde 2">
                <input type="text" class="ans-input" placeholder="Nepareizā atbilde 3">
            </div>
            
            <div class="button-group">
                <button onclick="addQuestionToTopic()">+ Pievienot sarakstam</button>
            </div>
        </div>

        <p id="q-count">Pievienoti jautājumi: 0</p>

        <div class="button-group">
            <button onclick="saveTopic()" style="background: var(--primary-gradient);">Saglabāt visu tēmu</button>
            <button onclick="logoutAdmin()" style="background: #6c757d;">Iziet</button>
        </div>
    </div>
    
    <h3>Esošās tēmas</h3>
    <div id="topics-list"></div>
</div>
<script src="test.js"></script>
<script>
    document.getElementById("admin-login").style.display = "block";
</script>
</body>
</html>
